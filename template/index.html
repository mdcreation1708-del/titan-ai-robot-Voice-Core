<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiTaN - Robot Hardware Node</title>
    <!-- Lightweight broker script to sync static sites directly -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background-color: #0b0f19; color: #00e5ff; font-family: monospace; text-align: center; padding: 30px; }
        .node-box { border: 2px solid #00e5ff; background: #111625; padding: 30px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 0 20px rgba(0,229,255,0.2); }
        .live-indicator { color: #39ff14; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .btn { background: #00e5ff; color: #000; font-weight: bold; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; font-size: 1.1rem; width: 100%; }
        .log-box { text-align: left; background: #000; margin-top: 20px; padding: 15px; height: 180px; overflow-y: auto; color: #c9d1d9; font-size: 0.85rem; border-radius: 6px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="node-box">
        <h2>🤖 TiTaN HARDWARE HEAD NODE</h2>
        <p>Status: <span id="status-text" style="color:#ffaa00;">Awaiting Activation</span></p>
        
        <button class="btn" id="act-btn" onclick="bootRobotHead()">WAKE UP TITAN</button>
        
        <div id="signal-log" class="log-box">
            [SYS] Core systems online. Press button to initialize hardware audio array...
        </div>
    </div>

    <script>
        let recognition;
        let active = false;
        let client;
        const logBox = document.getElementById('signal-log');

        function printLog(text, color="#c9d1d9") {
            logBox.innerHTML += `<div style="color:${text.startsWith('[Mic Heard]') ? '#8b949e' : color}">&gt; ${text}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function robotSpeak(textToSay) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const voiceOut = new SpeechSynthesisUtterance(textToSay);
                voiceOut.lang = 'en-US';
                voiceOut.rate = 0.95;
                voiceOut.pitch = 0.85;

                // Stop mic loop while speaking to avoid self-trigger feedback echo
                if (recognition && active) { recognition.abort(); }
                voiceOut.onend = () => {
                    if (active && recognition) { try { recognition.start(); } catch(e){} }
                };
                window.speechSynthesis.speak(voiceOut);
            }
        }

        function bootRobotHead() {
            active = true;
            document.getElementById('act-btn').style.display = 'none';
            document.getElementById('status-text').innerHTML = "ONLINE";
            document.getElementById('status-text').className = "live-indicator";
            
            robotSpeak("Hello MD sir Titan is ready");
            printLog("System initialized. Said: 'Hello MD sir Titan is ready'", "#39ff14");

            initStaticLink();
            initLocalMic();
        }

        function initStaticLink() {
            printLog("Opening WebSocket channel over secure layer...", "#ffaa00");
            client = mqtt.connect('wss://broker.hivemq.com:8000/mqtt');

            client.on('connect', () => {
                printLog("Direct cross-site data link successfully established!", "#39ff14");
                client.subscribe('titan/robot/comms');
            });

            client.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());
                
                if (data.type === "question") {
                    printLog(`Incoming Question: "${data.payload}"`, "#00e5ff");
                    robotSpeak("OKay Boss Finding");
                } else if (data.type === "movement") {
                    printLog(`Incoming Movement Command: [${data.payload}]`, "#39ff14");
                    robotSpeak("moving Boss");
                }
            });
        }

        function initLocalMic() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!window.SpeechRecognition) return;

            recognition = new window.SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onend = () => { if(active) { try { recognition.start(); } catch(e){} } };

            recognition.onresult = (event) => {
                const speech = event.results[0][0].transcript.toLowerCase();
                printLog(`[Mic Heard]: "${speech}"`);

                if (speech.includes("titan") || speech.includes("hey titan") || speech.includes("tighten")) {
                    if (speech.includes("forward") || speech.includes("move") || speech.includes("moving") || speech.includes("find")) {
                        printLog("Local Instruction Matrix Match: FORWARD", "#39ff14");
                        robotSpeak("moving Boss");
                    } else if (speech.includes("stop") || speech.includes("halt")) {
                        robotSpeak("stopping Boss");
                    }
                }
            };
            recognition.start();
        }
    </script>
</body>
</html>
