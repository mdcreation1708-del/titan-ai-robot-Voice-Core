<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiTaN Voice Core Engine</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00e5ff;
            font-family: 'Courier New', Courier, monospace;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .core-container {
            border: 2px solid #00e5ff;
            background-color: #161b22;
            padding: 25px;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }
        .status-display {
            background-color: #0d1117;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 4px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .terminal-box {
            background-color: #000;
            border: 1px solid #30363d;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            font-size: 0.9rem;
            color: #c9d1d9;
            border-radius: 4px;
        }
        .control-btn {
            width: 100%;
            background-color: #21262d;
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .control-btn:hover {
            background-color: #00e5ff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="core-container">
        <h2 style="margin-top:0; text-align:center; letter-spacing: 2px;">TITAN VOICE CORE ENGINE</h2>
        
        <div class="status-display">
            SYSTEM STATUS: <span id="core-status" style="color: #ffaa00;">OFFLINE</span>
        </div>

        <button class="control-btn" id="trigger-btn" onclick="toggleVoiceCore()">INITIALIZE CORE LINK</button>

        <div class="terminal-box" id="voice-logs">
            [SYSTEM] Voice Core standing by. Awaiting hardware link initialization...
        </div>
    </div>

    <script>
        let recognition;
        let coreActive = false;
        const logs = document.getElementById('voice-logs');
        const statusDisplay = document.getElementById('core-status');
        const triggerBtn = document.getElementById('trigger-btn');

        function logToTerminal(message, color = "#c9d1d9") {
            logs.innerHTML += `<div style="color: ${color};">&gt; ${message}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        function toggleVoiceCore() {
            if (!coreActive) {
                initSpeechEngine();
            } else {
                stopSpeechEngine();
            }
        }

        function initSpeechEngine() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!window.SpeechRecognition) {
                statusDisplay.innerHTML = "UNSUPPORTED ENVIRONMENT";
                statusDisplay.style.color = "#ff5555";
                logToTerminal("ERROR: Mobile browser lacks global WebSpeech SpeechRecognition frameworks.", "#ff5555");
                return;
            }

            recognition = new window.SpeechRecognition();
            
            // Mobile Optimization parameters
            recognition.continuous = false; 
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                coreActive = true;
                statusDisplay.innerHTML = "ACTIVE LISTENING";
                statusDisplay.style.color = "#39ff14";
                triggerBtn.innerHTML = "TERMINATE CORE LINK";
                logToTerminal("Voice Core successfully linked to microphone hardware. Monitoring...", "#39ff14");
            };

            recognition.onerror = (event) => {
                console.error("Core Engine Error: ", event.error);
                if (event.error === 'not-allowed') {
                    logToTerminal("CRITICAL: Microphone access denied by security layer. Check browser site permissions.", "#ff5555");
                    stopSpeechEngine();
                }
            };

            // Infinite loop recreation for mobile background stability
            recognition.onend = () => {
                if (coreActive) {
                    recognition.start();
                }
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.trim().toLowerCase();
                logToTerminal(`Audio Matched: "${transcript}"`, "#8b949e");

                // Explicit parsing matrix checking wake token phonetics on mobile engines
                if (transcript.includes("titan") || transcript.includes("hey titan") || transcript.includes("tighten")) {
                    logToTerminal("WAKE WORD DETECTED: WAKING UP TITAN SYSTEM CORE", "#39ff14");
                    
                    // Route your target payload executions here
                    executeVoiceAction(transcript);
                }
            };

            recognition.start();
        }

        function stopSpeechEngine() {
            coreActive = false;
            if (recognition) {
                recognition.stop();
            }
            statusDisplay.innerHTML = "OFFLINE";
            statusDisplay.style.color = "#ff5555";
            triggerBtn.innerHTML = "INITIALIZE CORE LINK";
            logToTerminal("Voice Core terminated safely. Microphone hardware unlinked.", "#ff5555");
        }

        function executeVoiceAction(phrase) {
            if (phrase.includes("forward")) {
                logToTerminal("Action Parsed: Sending Chassis Movement Vector [FORWARD]", "#00e5ff");
            } else if (phrase.includes("stop")) {
                logToTerminal("Action Parsed: Sending Chassis Movement Vector [HALT]", "#ff5555");
            } else if (phrase.includes("left")) {
                logToTerminal("Action Parsed: Sending Chassis Movement Vector [LEFT]", "#00e5ff");
            } else if (phrase.includes("right")) {
                logToTerminal("Action Parsed: Sending Chassis Movement Vector [RIGHT]", "#00e5ff");
            }
        }
    </script>
</body>
</html>
